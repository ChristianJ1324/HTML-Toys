<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Entropic Loom</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated; /* Sharp, digital aesthetic */
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #444;
            padding: 15px;
            color: #0f0;
            width: 300px;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
            user-select: none;
        }

        h1 {
            font-size: 16px;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }

        .control-group {
            margin-bottom: 10px;
        }

        label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 3px;
        }

        input[type=range] {
            width: 100%;
            background: transparent;
            -webkit-appearance: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            height: 4px;
            background: #333;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            background: #0f0;
            margin-top: -4px;
            cursor: pointer;
        }

        button {
            width: 100%;
            background: #111;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 8px;
            margin-top: 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            background: #0f0;
            color: #000;
        }

        .stat {
            font-size: 10px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Entropic Loom v1.0</h1>
        
        <div class="control-group">
            <label>Agent Count: <span id="val-count">2000</span></label>
            <input type="range" id="param-count" min="500" max="10000" step="100" value="2000">
        </div>

        <div class="control-group">
            <label>Sensor Angle: <span id="val-angle">45</span>°</label>
            <input type="range" id="param-angle" min="1" max="120" step="1" value="45">
        </div>

        <div class="control-group">
            <label>Sensor Distance: <span id="val-dist">9</span></label>
            <input type="range" id="param-dist" min="2" max="50" step="1" value="9">
        </div>

        <div class="control-group">
            <label>Decay Rate: <span id="val-decay">0.96</span></label>
            <input type="range" id="param-decay" min="0.80" max="0.99" step="0.001" value="0.96">
        </div>

        <div class="control-group">
            <label>Evaporation: <span id="val-diff">1</span></label>
            <input type="range" id="param-diff" min="0" max="3" step="1" value="1">
        </div>

        <button id="btn-chaos">INJECT CHAOS</button>
        <button id="btn-reset">RESET SYSTEM</button>
        
        <div class="stat" id="fps">FPS: 60</div>
    </div>

    <canvas id="simCanvas"></canvas>

<script>
/**
 * THE ENTROPIC LOOM
 * A Physarum Polycephalum implementation optimized for Vanilla JS.
 * Uses TypedArrays for memory efficiency and direct pixel manipulation.
 */

const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const ui = {
    count: document.getElementById('param-count'),
    angle: document.getElementById('param-angle'),
    dist: document.getElementById('param-dist'),
    decay: document.getElementById('param-decay'),
    diff: document.getElementById('param-diff'),
    fps: document.getElementById('fps'),
    valCount: document.getElementById('val-count'),
    valAngle: document.getElementById('val-angle'),
    valDist: document.getElementById('val-dist'),
    valDecay: document.getElementById('val-decay'),
    valDiff: document.getElementById('val-diff')
};

// Configuration
let width, height;
let agents = []; 
let trailMap; // Float32Array for high precision pheromones
let pixelData; // Uint8ClampedArray for rendering

// Simulation Parameters
const settings = {
    agentCount: 2000,
    sensorAngle: Math.PI / 4,
    sensorDist: 9,
    turnSpeed: Math.PI / 8, // How fast they turn
    speed: 2,
    decay: 0.96,
    diffuseRadius: 1
};

// Resize Handling
function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    
    // Re-init arrays
    trailMap = new Float32Array(width * height);
    // Create image data buffer
    pixelData = ctx.createImageData(width, height);
    
    initAgents();
}

// Agent initialization
function initAgents() {
    agents = new Float32Array(settings.agentCount * 3); // x, y, angle
    for (let i = 0; i < settings.agentCount; i++) {
        const idx = i * 3;
        // Start in a circle in the center
        const r = Math.random() * (height / 4);
        const theta = Math.random() * Math.PI * 2;
        agents[idx] = width / 2 + Math.cos(theta) * r; // x
        agents[idx + 1] = height / 2 + Math.sin(theta) * r; // y
        agents[idx + 2] = theta + Math.PI; // angle (pointing out or in)
    }
}

// Helper: Get trail value at coordinates
function getTrail(x, y) {
    if (x < 0 || x >= width || y < 0 || y >= height) return 0;
    return trailMap[Math.floor(y) * width + Math.floor(x)];
}

// Core Logic
function updateAgents() {
    for (let i = 0; i < settings.agentCount; i++) {
        const idx = i * 3;
        let x = agents[idx];
        let y = agents[idx + 1];
        let angle = agents[idx + 2];

        // 1. SENSE
        const sensorAngleRad = settings.sensorAngle;
        const sensorDist = settings.sensorDist;

        // Calculate sensor positions
        const rightAngle = angle + sensorAngleRad;
        const leftAngle = angle - sensorAngleRad;

        const rx = x + Math.cos(rightAngle) * sensorDist;
        const ry = y + Math.sin(rightAngle) * sensorDist;
        
        const lx = x + Math.cos(leftAngle) * sensorDist;
        const ly = y + Math.sin(leftAngle) * sensorDist;

        const cx = x + Math.cos(angle) * sensorDist;
        const cy = y + Math.sin(angle) * sensorDist;

        // Sample trails
        const rVal = getTrail(rx, ry);
        const lVal = getTrail(lx, ly);
        const cVal = getTrail(cx, cy);

        // 2. DECIDE (Physarum Logic)
        if (cVal > lVal && cVal > rVal) {
            // Keep straight
        } else if (cVal < lVal && cVal < rVal) {
            // Rotate randomly
            angle += (Math.random() - 0.5) * 2 * settings.turnSpeed;
        } else if (lVal > rVal) {
            angle -= settings.turnSpeed;
        } else if (rVal > lVal) {
            angle += settings.turnSpeed;
        }

        // 3. MOVE
        agents[idx + 2] = angle;
        const newX = x + Math.cos(angle) * settings.speed;
        const newY = y + Math.sin(angle) * settings.speed;

        // Boundary wrap
        agents[idx] = (newX + width) % width;
        agents[idx + 1] = (newY + height) % height;

        // 4. DEPOSIT
        // We write directly to the trail map. 
        // We floor coordinates to get the array index.
        const mapIdx = Math.floor(agents[idx + 1]) * width + Math.floor(agents[idx]);
        if (mapIdx >= 0 && mapIdx < trailMap.length) {
            trailMap[mapIdx] = 1.0; // Max saturation
        }
    }
}

function processMap() {
    // This is the heavy lifting: Diffusion and Decay
    // To make it fast, we do a simplified box blur + decay in a single pass
    // For true incomprehensible visuals, we swap buffers or modify in place?
    // In-place modification creates "drift" artifacts which look cool here.
    
    const w = width;
    const h = height;
    const decay = settings.decay;
    
    // We use a temporary buffer for the blur step to ensure smoothness
    // Actually, purely strictly in-place is faster and looks more "organic/glitchy"
    
    // We iterate strictly through the array
    // Optimization: Standard Loop is fast enough for ~1080p in modern JS engines
    
    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            const i = y * w + x;
            
            // Simple 3x3 Box Blur Kernel
            // 0 1 0
            // 1 1 1
            // 0 1 0
            
            let sum = trailMap[i];
            let neighbors = 1;

            if (x > 0) { sum += trailMap[i - 1]; neighbors++; }
            if (x < w - 1) { sum += trailMap[i + 1]; neighbors++; }
            if (y > 0) { sum += trailMap[i - w]; neighbors++; }
            if (y < h - 1) { sum += trailMap[i + w]; neighbors++; }

            // Apply blur
            let blurred = sum / neighbors;
            
            // Apply Decay
            trailMap[i] = blurred * decay;
        }
    }
}

function render() {
    const data = pixelData.data;
    const len = trailMap.length;

    for (let i = 0; i < len; i++) {
        const val = trailMap[i];
        const pIdx = i * 4;

        if (val < 0.01) {
            data[pIdx] = 0;
            data[pIdx + 1] = 0;
            data[pIdx + 2] = 0;
            data[pIdx + 3] = 255; // Opaque black
        } else {
            // MIND-BREAKING COLOR MAPPING
            // We map intensity to a strange thermal/neon palette
            // High intensity = White/Cyan
            // Medium = Magenta/Purple
            // Low = Deep Blue
            
            // Red Channel: Non-linear response
            const r = Math.min(255, val * 255 * 3 * (val > 0.5 ? 1 : 0));
            // Green Channel: Mid-range peak
            const g = Math.min(255, val * 255 * 1.5);
            // Blue Channel: Base glow
            const b = Math.min(255, val * 255 * 5);

            data[pIdx] = r;
            data[pIdx + 1] = g;
            data[pIdx + 2] = b;
            data[pIdx + 3] = 255;
        }
    }
    ctx.putImageData(pixelData, 0, 0);
}

// Interaction
canvas.addEventListener('mousemove', (e) => {
    // Mouse interaction: Add a massive burst of pheromones
    // or disrupt trails. Let's make the mouse a "Repulsor/Attractor"
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    
    // Draw a blob of "food"
    const radius = 50;
    for(let y = -radius; y < radius; y++) {
        for(let x = -radius; x < radius; x++) {
            if (x*x + y*y < radius*radius) {
                const idx = Math.floor(my + y) * width + Math.floor(mx + x);
                if (idx >= 0 && idx < trailMap.length) {
                    trailMap[idx] = 1.0;
                }
            }
        }
    }
});

document.getElementById('btn-chaos').addEventListener('click', () => {
    // Randomize all angles
    for(let i=0; i<settings.agentCount; i++) {
        agents[i*3 + 2] = Math.random() * Math.PI * 2;
    }
});

document.getElementById('btn-reset').addEventListener('click', () => {
    trailMap.fill(0);
    initAgents();
});

// UI Bindings
ui.count.addEventListener('input', (e) => {
    settings.agentCount = parseInt(e.target.value);
    ui.valCount.innerText = settings.agentCount;
    initAgents();
});
ui.angle.addEventListener('input', (e) => {
    settings.sensorAngle = (parseInt(e.target.value) * Math.PI) / 180;
    ui.valAngle.innerText = e.target.value;
});
ui.dist.addEventListener('input', (e) => {
    settings.sensorDist = parseInt(e.target.value);
    ui.valDist.innerText = settings.sensorDist;
});
ui.decay.addEventListener('input', (e) => {
    settings.decay = parseFloat(e.target.value);
    ui.valDecay.innerText = settings.decay;
});

// Main Loop
let lastTime = 0;
function loop(timestamp) {
    const dt = timestamp - lastTime;
    lastTime = timestamp;
    ui.fps.innerText = `FPS: ${Math.round(1000/dt)}`;

    updateAgents();
    processMap();
    render();

    requestAnimationFrame(loop);
}

// Boot
window.addEventListener('resize', resize);
resize();
requestAnimationFrame(loop);

</script>
</body>
</html>
