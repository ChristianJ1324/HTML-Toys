<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DUMMY LAB - Interactive Ragdoll</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #222;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            user-select: none;
        }
        canvas { display: block; background: #e0e0e0; cursor: crosshair; }

        /* Toolbar */
        #toolbar {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .tool {
            width: 50px; height: 50px;
            background: #444;
            border: 2px solid #666;
            border-radius: 8px;
            cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px;
            transition: all 0.2s;
            position: relative;
        }
        .tool:hover { background: #555; transform: scale(1.1); }
        .tool.active { background: #00ccff; border-color: #fff; color: #000; box-shadow: 0 0 15px #00ccff; }
        
        .tooltip {
            position: absolute; right: 70px;
            background: #000; color: #fff; padding: 5px 10px;
            font-size: 12px; border-radius: 4px;
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
            white-space: nowrap;
        }
        .tool:hover .tooltip { opacity: 1; }

        #title {
            position: absolute; top: 20px; left: 20px;
            color: #333; font-weight: 900; font-size: 32px;
            text-transform: uppercase; letter-spacing: -1px;
            pointer-events: none;
        }
        #sub { font-size: 14px; color: #666; font-weight: normal; letter-spacing: 0; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="title">DUMMY LAB <div id="sub">Physics Sandbox v1.0</div></div>

    <div id="toolbar">
        <div class="tool active" onclick="setTool('drag')" title="Hand">
            ✋
            <div class="tooltip">DRAG (Left Click)</div>
        </div>
        <div class="tool" onclick="setTool('web')" title="Web">
            🕸️
            <div class="tooltip">WEB SHOOTER</div>
        </div>
        <div class="tool" onclick="setTool('gun')" title="Gun">
            🔫
            <div class="tooltip">AK-47</div>
        </div>
        <div class="tool" onclick="setTool('bomb')" title="Bomb">
            💣
            <div class="tooltip">EXPLOSIVE</div>
        </div>
        <div class="tool" onclick="setTool('cut')" title="Knife">
            🔪
            <div class="tooltip">CUTTER</div>
        </div>
        <div class="tool" onclick="resetDummy()" style="background:#800; border-color:#f00;" title="Reset">
            🔄
            <div class="tooltip">RESET DUMMY</div>
        </div>
    </div>

    <canvas id="c"></canvas>

<script>
    // --- SETUP ---
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let width, height;

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- CONFIG ---
    const GRAVITY = 0.5;
    const FRICTION = 0.99;
    const ITERATIONS = 5; // Physics stiffness
    let currentTool = 'drag';

    // --- PHYSICS ENGINE (Verlet) ---
    class Point {
        constructor(x, y, mass = 1) {
            this.x = x; this.y = y;
            this.px = x; this.py = y;
            this.mass = mass;
            this.pinned = false;
        }
        update() {
            if (this.pinned) return;
            // Velocity = (Current - Previous) * Friction
            let vx = (this.x - this.px) * FRICTION;
            let vy = (this.y - this.py) * FRICTION;

            this.px = this.x;
            this.py = this.y;

            this.x += vx;
            this.y += vy + GRAVITY;

            // Wall Collisions
            if (this.x > width) { this.x = width; this.px = this.x + vx * 0.5; }
            else if (this.x < 0) { this.x = 0; this.px = this.x + vx * 0.5; }
            if (this.y > height) { this.y = height; this.py = this.y + vy * 0.5; }
            else if (this.y < 0) { this.y = 0; this.py = this.y + vy * 0.5; }
        }
    }

    class Stick {
        constructor(p1, p2, length = null, stiffness = 1, width = 6, color = '#333') {
            this.p1 = p1;
            this.p2 = p2;
            // If length not provided, calculate current distance
            this.length = length || Math.hypot(p1.x - p2.x, p1.y - p2.y);
            this.stiffness = stiffness;
            this.width = width;
            this.color = color;
            this.isRope = false; // Ropes can collapse, sticks cannot
        }

        resolve() {
            const dx = this.p1.x - this.p2.x;
            const dy = this.p1.y - this.p2.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            // If rope, only pull if over-extended
            if (this.isRope && dist < this.length) return;

            const diff = (this.length - dist) / dist * this.stiffness;
            const offsetX = dx * diff * 0.5;
            const offsetY = dy * diff * 0.5;

            // Mass-based movement (simplified: equal mass)
            if (!this.p1.pinned) { this.p1.x += offsetX; this.p1.y += offsetY; }
            if (!this.p2.pinned) { this.p2.x -= offsetX; this.p2.y -= offsetY; }
        }

        draw() {
            ctx.beginPath();
            ctx.moveTo(this.p1.x, this.p1.y);
            ctx.lineTo(this.p2.x, this.p2.y);
            ctx.lineWidth = this.width;
            ctx.strokeStyle = this.color;
            ctx.lineCap = 'round';
            ctx.stroke();
        }
    }

    // --- GAME STATE ---
    let points = [];
    let sticks = [];
    let bullets = [];
    let webs = [];
    let particles = []; // Blood/Sparks

    // --- RAGDOLL BUILDER ---
    function createRagdoll(x, y) {
        points = []; sticks = []; webs = [];
        
        // Helper to add point
        const addP = (ox, oy) => {
            const p = new Point(x + ox, y + oy);
            points.push(p);
            return p;
        };
        // Helper to add stick
        const link = (p1, p2, w=6, col='#333') => {
            const s = new Stick(p1, p2, null, 1, w, col);
            sticks.push(s);
            return s;
        };

        // Anatomy
        const head = addP(0, 0); // 0
        const neck = addP(0, 30); // 1
        const chest = addP(0, 50); // 2
        const hips = addP(0, 100); // 3
        
        // Arms
        const lShoulder = addP(-30, 30); // 4
        const lElbow = addP(-50, 60); // 5
        const lHand = addP(-60, 90); // 6
        
        const rShoulder = addP(30, 30); // 7
        const rElbow = addP(50, 60); // 8
        const rHand = addP(60, 90); // 9

        // Legs
        const lHip = addP(-20, 100); // 10
        const lKnee = addP(-20, 150); // 11
        const lFoot = addP(-20, 200); // 12

        const rHip = addP(20, 100); // 13
        const rKnee = addP(20, 150); // 14
        const rFoot = addP(20, 200); // 15

        // --- CONNECTIONS ---
        // Spine
        link(head, neck, 25, '#444'); // Head
        link(neck, chest, 20, '#333');
        link(chest, hips, 20, '#333');

        // Arms
        link(neck, lShoulder); link(lShoulder, lElbow); link(lElbow, lHand);
        link(neck, rShoulder); link(rShoulder, rElbow); link(rElbow, rHand);

        // Legs
        link(hips, lHip); link(lHip, lKnee); link(lKnee, lFoot);
        link(hips, rHip); link(rHip, rKnee); link(rKnee, rFoot);

        // --- STRUCTURAL BRACING (Invisible constraints to keep shape) ---
        // Without these, he flops like spaghetti
        const brace = (p1, p2) => {
            const s = new Stick(p1, p2, null, 0.5, 0, 'transparent'); // Invisible
            sticks.push(s);
        };

        brace(lShoulder, hips); brace(rShoulder, hips); // Shoulders to hips
        brace(lHip, rHip); // Hip width
        brace(head, chest); // Stiff neck
        brace(lShoulder, rShoulder); // Shoulder width
    }

    // --- BULLET SYSTEM ---
    class Bullet {
        constructor(x, y, vx, vy) {
            this.x = x; this.y = y; this.vx = vx; this.vy = vy;
            this.life = 60;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            this.life--;
            // Collision check
            for(let p of points) {
                const dx = p.x - this.x;
                const dy = p.y - this.y;
                if (dx*dx + dy*dy < 400) { // Hit radius 20
                    // Apply massive force to point
                    p.px -= this.vx * 0.5; 
                    p.py -= this.vy * 0.5;
                    this.life = 0;
                    spawnBlood(this.x, this.y);
                    break;
                }
            }
        }
        draw() {
            ctx.fillStyle = '#ff0';
            ctx.fillRect(this.x-2, this.y-2, 4, 4);
        }
    }

    // --- PARTICLE SYSTEM ---
    function spawnBlood(x, y) {
        for(let i=0; i<5; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5,
                life: 1.0, color: '#aa0000'
            });
        }
    }

    // --- INTERACTION ---
    const mouse = { x: 0, y: 0, down: false };
    let dragPoint = null;

    canvas.addEventListener('mousemove', e => {
        mouse.x = e.clientX; mouse.y = e.clientY;
    });
    canvas.addEventListener('mousedown', e => {
        mouse.down = true;
        handleToolClick();
    });
    canvas.addEventListener('mouseup', e => {
        mouse.down = false;
        dragPoint = null;
    });

    function handleToolClick() {
        // Find nearest point
        let nearest = null;
        let minDst = 1000;
        for(let p of points) {
            const d = Math.hypot(p.x - mouse.x, p.y - mouse.y);
            if(d < minDst) { minDst = d; nearest = p; }
        }

        // TOOL LOGIC
        if (currentTool === 'drag') {
            if (nearest && minDst < 50) dragPoint = nearest;
        }
        else if (currentTool === 'web') {
            if (nearest && minDst < 100) {
                // Create a "Anchor" point at mouse loc
                const anchor = new Point(mouse.x, mouse.y);
                anchor.pinned = true;
                points.push(anchor);
                // Create rope
                const rope = new Stick(anchor, nearest, null, 0.1, 2, '#fff'); // Low stiffness = elastic
                rope.isRope = true;
                sticks.push(rope);
                webs.push({ anchor: anchor, stick: rope });
            }
        }
        else if (currentTool === 'bomb') {
            // Radial Blast
            for(let p of points) {
                const dx = p.x - mouse.x;
                const dy = p.y - mouse.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < 200) {
                    const force = (200 - dist) * 0.5;
                    const angle = Math.atan2(dy, dx);
                    p.px -= Math.cos(angle) * force;
                    p.py -= Math.sin(angle) * force;
                }
            }
            // Visual FX
            for(let i=0; i<20; i++) particles.push({
                x: mouse.x, y: mouse.y,
                vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15,
                life: 1.0, color: '#ffaa00'
            });
        }
        else if (currentTool === 'cut') {
            // Cut Sticks near mouse
            for(let i=sticks.length-1; i>=0; i--) {
                const s = sticks[i];
                // Dist from point to line segment
                const mx = (s.p1.x + s.p2.x)/2;
                const my = (s.p1.y + s.p2.y)/2;
                if (Math.hypot(mx - mouse.x, my - mouse.y) < 20) {
                    sticks.splice(i, 1);
                }
            }
        }
    }

    // --- MAIN LOOP ---
    function loop() {
        // Clear
        ctx.fillStyle = '#e0e0e0';
        ctx.fillRect(0, 0, width, height);

        // Draw Grid
        ctx.strokeStyle = '#d0d0d0';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for(let x=0; x<width; x+=50) { ctx.moveTo(x,0); ctx.lineTo(x,height); }
        for(let y=0; y<height; y+=50) { ctx.moveTo(0,y); ctx.lineTo(width,y); }
        ctx.stroke();

        // Continuous Tools (Gun)
        if (mouse.down && currentTool === 'gun') {
            if (Math.random() > 0.5) { // Fire rate limiter
                // Shoot towards center of screen or random spread
                const vx = (Math.random()-0.5) * 5;
                const vy = 20; // Downwards bullets if clicking top? 
                // No, shoot FROM mouse
                // Let's create a stream of bullets from mouse
                bullets.push(new Bullet(mouse.x, mouse.y, (Math.random()-0.5)*5, 15));
            }
        }

        // Dragging Logic
        if (dragPoint) {
            // Pull harder the further the mouse is (Elastic drag)
            const dx = mouse.x - dragPoint.x;
            const dy = mouse.y - dragPoint.y;
            dragPoint.px = dragPoint.x - dx * 0.1;
            dragPoint.py = dragPoint.y - dy * 0.1;
        }

        // Physics Updates
        for(let p of points) p.update();
        for(let i=0; i<ITERATIONS; i++) {
            for(let s of sticks) s.resolve();
        }
        for(let b of bullets) b.update();

        // Render Sticks
        for(let s of sticks) s.draw();

        // Render Head (Circle)
        if(points.length > 0) {
            const head = points[0];
            ctx.fillStyle = '#444';
            ctx.beginPath(); ctx.arc(head.x, head.y, 15, 0, Math.PI*2); ctx.fill();
            // Eyes
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(head.x-5, head.y-2, 4, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(head.x+5, head.y-2, 4, 0, Math.PI*2); ctx.fill();
        }

        // Render Webs
        for(let w of webs) {
            // Draw spider web line
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.beginPath(); 
            ctx.moveTo(w.anchor.x, w.anchor.y); 
            ctx.lineTo(w.stick.p2.x, w.stick.p2.y); 
            ctx.stroke();
            // Draw anchor
            ctx.fillStyle = '#ccc';
            ctx.beginPath(); ctx.arc(w.anchor.x, w.anchor.y, 3, 0, Math.PI*2); ctx.fill();
        }

        // Render Bullets
        for(let i=bullets.length-1; i>=0; i--) {
            let b = bullets[i];
            if(b.life<=0 || b.y > height) bullets.splice(i, 1);
            else b.draw();
        }

        // Render Particles
        for(let i=particles.length-1; i>=0; i--) {
            let p = particles[i];
            p.x += p.vx; p.y += p.vy + 0.2; // Gravity
            p.life -= 0.02;
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1.0;
            if(p.life <= 0) particles.splice(i, 1);
        }

        requestAnimationFrame(loop);
    }

    // --- UI ---
    window.setTool = function(t) {
        currentTool = t;
        document.querySelectorAll('.tool').forEach(el => el.classList.remove('active'));
        // Find the element that called this function... simplified:
        const map = { 'drag':0, 'web':1, 'gun':2, 'bomb':3, 'cut':4 };
        document.querySelectorAll('.tool')[map[t]].classList.add('active');
    };

    window.resetDummy = function() {
        createRagdoll(width/2, 100);
    };

    // Start
    createRagdoll(width/2, 200);
    loop();

</script>
</body>
</html>
