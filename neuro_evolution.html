<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEURO-EVOLUTION: STEERING AGENTS</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: 'Courier New', monospace; color: #0f0; }
        canvas { display: block; }
        
        #ui {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0, 0, 0, 0.85);
            padding: 15px; border: 1px solid #0f0;
            pointer-events: none; /* Let clicks pass through to canvas */
            user-select: none;
            width: 280px;
        }
        
        #controls {
            pointer-events: auto; /* Enable interaction for inputs */
        }

        h1 { margin: 0 0 10px 0; font-size: 16px; text-transform: uppercase; border-bottom: 1px solid #0f0; padding-bottom: 5px; }
        .stat { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 12px; }
        .slider-container { margin-top: 10px; }
        input[type=range] { width: 100%; accent-color: #0f0; cursor: pointer; }
        button { 
            width: 100%; background: #000; color: #0f0; border: 1px solid #0f0; 
            padding: 5px; margin-top: 10px; cursor: pointer; font-family: inherit; text-transform: uppercase;
            transition: background 0.2s;
        }
        button:hover { background: #0f0; color: #000; }

        /* Neural Net Viz */
        #brain-viz {
            margin-top: 15px;
            border-top: 1px solid #444;
            padding-top: 10px;
            text-align: center;
        }
        canvas#brain-canvas {
            background: #000;
            border: 1px solid #333;
            margin: 0 auto;
        }
    </style>
</head>
<body>

<div id="ui">
    <h1>Gen <span id="gen-count">1</span></h1>
    <div class="stat"><span>Alive:</span> <span id="alive-count">0</span></div>
    <div class="stat"><span>Best Fitness:</span> <span id="best-fit">0</span></div>
    <div class="stat"><span>Timer:</span> <span id="timer">0</span></div>
    
    <div id="controls">
        <div class="slider-container">
            <label>Mutation Rate: <span id="mut-val">5%</span></label>
            <input type="range" id="mutation" min="1" max="50" value="5">
        </div>
        <div class="slider-container">
            <label>Time Scale: <span id="speed-val">1x</span></label>
            <input type="range" id="speed" min="1" max="10" value="1">
        </div>
        <button onclick="sim.nextGeneration()">Force Evolve (Space)</button>
        <button onclick="sim.clearObstacles()">Clear Walls</button>
    </div>

    <div id="brain-viz">
        <div class="stat" style="justify-content:center; color:#888;">Live Brain Activity (Best Agent)</div>
        <canvas id="brain-canvas" width="200" height="120"></canvas>
    </div>
</div>

<script>
/**
 * 1. MATH & UTILS
 * Fast matrix operations for the Neural Network.
 */
class NeuralNetwork {
    constructor(inputNodes, hiddenNodes, outputNodes) {
        this.inputNodes = inputNodes;
        this.hiddenNodes = hiddenNodes;
        this.outputNodes = outputNodes;

        // Weights: Random values between -1 and 1
        this.weightsIH = new Float32Array(this.hiddenNodes * this.inputNodes).map(() => Math.random() * 2 - 1);
        this.weightsHO = new Float32Array(this.outputNodes * this.hiddenNodes).map(() => Math.random() * 2 - 1);
        
        // Biases
        this.biasH = new Float32Array(this.hiddenNodes).map(() => Math.random() * 2 - 1);
        this.biasO = new Float32Array(this.outputNodes).map(() => Math.random() * 2 - 1);
    }

    predict(inputs) {
        // 1. Input -> Hidden
        let hidden = new Float32Array(this.hiddenNodes);
        for (let i = 0; i < this.hiddenNodes; i++) {
            let sum = 0;
            for (let j = 0; j < this.inputNodes; j++) {
                sum += inputs[j] * this.weightsIH[i * this.inputNodes + j];
            }
            sum += this.biasH[i];
            hidden[i] = Math.tanh(sum); // Activation
        }

        // 2. Hidden -> Output
        let outputs = new Float32Array(this.outputNodes);
        for (let i = 0; i < this.outputNodes; i++) {
            let sum = 0;
            for (let j = 0; j < this.hiddenNodes; j++) {
                sum += hidden[i] * this.weightsHO[i * this.hiddenNodes + j];
            }
            sum += this.biasO[i];
            outputs[i] = Math.tanh(sum); // Activation
        }

        return { outputs, hidden }; // Return hidden state for visualization
    }

    // Genetic Algorithm: Mix logic
    copy() {
        let n = new NeuralNetwork(this.inputNodes, this.hiddenNodes, this.outputNodes);
        n.weightsIH.set(this.weightsIH);
        n.weightsHO.set(this.weightsHO);
        n.biasH.set(this.biasH);
        n.biasO.set(this.biasO);
        return n;
    }

    mutate(rate) {
        const mutateVal = (val) => {
            if (Math.random() < rate) {
                // Add random gaussian noise or fully replace? Let's add noise (Smooth evolution)
                return val + (Math.random() * 2 - 1) * 0.5; 
            }
            return val;
        };

        this.weightsIH = this.weightsIH.map(mutateVal);
        this.weightsHO = this.weightsHO.map(mutateVal);
        this.biasH = this.biasH.map(mutateVal);
        this.biasO = this.biasO.map(mutateVal);
    }
}

/**
 * 2. THE AGENT (The Rocket)
 */
class Agent {
    constructor(brain) {
        this.pos = { x: 50, y: window.innerHeight / 2 };
        this.vel = { x: 0, y: 0 };
        this.acc = { x: 0, y: 0 };
        this.angle = 0;
        
        this.fitness = 0;
        this.dead = false;
        this.reachedTarget = false;
        this.isBest = false; // Flag for rendering
        this.timer = 0;

        // Neural Net (5 inputs: 5 raycasts, 2 outputs: Turn, Thrust)
        if (brain) {
            this.brain = brain.copy();
        } else {
            this.brain = new NeuralNetwork(5, 8, 2);
        }

        // Sensors
        this.rays = [-Math.PI/2, -Math.PI/4, 0, Math.PI/4, Math.PI/2]; // Angles relative to heading
        this.sensorReadings = [0,0,0,0,0];
        this.lastHiddenState = null; // For visualization
    }

    update(obstacles, target, width, height) {
        if (this.dead || this.reachedTarget) return;

        this.timer++;

        // 1. READ SENSORS
        // We cast 5 rays. If they hit a wall, input = 1. If clear, input = 0.
        // We also normalize distance. Closer wall = Higher input.
        for (let i = 0; i < this.rays.length; i++) {
            let rayAngle = this.angle + this.rays[i];
            let reading = this.castRay(this.pos, rayAngle, obstacles, width, height);
            this.sensorReadings[i] = reading;
        }

        // 2. THINK
        const prediction = this.brain.predict(this.sensorReadings);
        this.lastHiddenState = prediction.hidden;
        const outputs = prediction.outputs;

        // Output 0: Steering (-1 left, 1 right)
        // Output 1: Speed (0 to 1)
        const turnForce = outputs[0] * 0.2; 
        const thrust = (outputs[1] + 1) * 2; // Map -1:1 to 0:4

        this.angle += turnForce;
        
        this.vel.x = Math.cos(this.angle) * thrust;
        this.vel.y = Math.sin(this.angle) * thrust;

        this.pos.x += this.vel.x;
        this.pos.y += this.vel.y;

        // 3. COLLISION CHECK (Walls & Bounds)
        if (this.pos.x < 0 || this.pos.x > width || this.pos.y < 0 || this.pos.y > height) {
            this.dead = true;
        }
        for (let obs of obstacles) {
            if (this.distToSegment(this.pos, obs.a, obs.b) < 5) {
                this.dead = true;
            }
        }

        // 4. TARGET CHECK
        let d = Math.hypot(this.pos.x - target.x, this.pos.y - target.y);
        if (d < 20) {
            this.reachedTarget = true;
            this.dead = true;
        }
        
        // Fitness Calculation: Closer to target = better. Reaching target = huge bonus. Fast time = bonus.
        // We calculate this continuously so we can find the "current best" leader
        this.calcFitness(target);
    }

    castRay(pos, angle, obstacles, w, h) {
        let maxDist = 200;
        let closest = maxDist;
        
        let dx = Math.cos(angle);
        let dy = Math.sin(angle);

        // Check Walls
        let p2 = { x: pos.x + dx * maxDist, y: pos.y + dy * maxDist };
        
        // Helper: Line-Line Intersection
        const intersect = (x1, y1, x2, y2, x3, y3, x4, y4) => {
            const den = (x1 - x2) * (y3 - y4) - (y1 - y2) * (x3 - x4);
            if (den === 0) return null;
            const t = ((x1 - x3) * (y3 - y4) - (y1 - y3) * (x3 - x4)) / den;
            const u = -((x1 - x2) * (y1 - y3) - (y1 - y2) * (x1 - x3)) / den;
            if (t > 0 && t < 1 && u > 0 && u < 1) return t;
            return null;
        }

        // Screen Borders
        const borders = [
            {a:{x:0,y:0}, b:{x:w,y:0}}, {a:{x:w,y:0}, b:{x:w,y:h}},
            {a:{x:w,y:h}, b:{x:0,y:h}}, {a:{x:0,y:h}, b:{x:0,y:0}}
        ];

        // Check All Lines
        const checkLines = (lines) => {
            for(let l of lines) {
                let t = intersect(pos.x, pos.y, p2.x, p2.y, l.a.x, l.a.y, l.b.x, l.b.y);
                if (t && t * maxDist < closest) closest = t * maxDist;
            }
        }

        checkLines(borders);
        checkLines(obstacles);

        // Invert for Neural Net: 1 = Close Wall (Danger), 0 = Far/Clear
        return 1 - (closest / maxDist);
    }

    distToSegment(p, v, w) {
        const l2 = (w.x - v.x)**2 + (w.y - v.y)**2;
        if (l2 === 0) return Math.hypot(p.x - v.x, p.y - v.y);
        let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
        t = Math.max(0, Math.min(1, t));
        return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
    }

    calcFitness(target) {
        let d = Math.hypot(this.pos.x - target.x, this.pos.y - target.y);
        // Base score is inverse distance squared (gives huge weight to getting very close)
        this.fitness = 1 / (d * d + 1); 
        if (this.reachedTarget) this.fitness *= 100 + (10000/this.timer); // Bonus for speed
        if (this.dead && !this.reachedTarget) this.fitness *= 0.1; // Penalty for crashing
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.pos.x, this.pos.y);
        ctx.rotate(this.angle);

        // Draw Body
        if (this.isBest) {
            ctx.fillStyle = "#0ff";
            ctx.shadowBlur = 15; ctx.shadowColor = "#0ff";
            ctx.zIndex = 10;
        } else if (this.reachedTarget) {
            ctx.fillStyle = "#ff0";
        } else if (this.dead) {
            ctx.fillStyle = "#333";
        } else {
            ctx.fillStyle = "rgba(255,255,255,0.5)";
        }

        ctx.beginPath();
        ctx.moveTo(10, 0);
        ctx.lineTo(-10, -7);
        ctx.lineTo(-10, 7);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;

        // Draw Sensors (Only for Best or if selected? Just Best to save perf)
        if (this.isBest && !this.dead) {
            for(let i=0; i<this.rays.length; i++) {
                let reading = this.sensorReadings[i]; // 0 to 1
                let len = (1 - reading) * 200; // Visual length
                
                ctx.strokeStyle = `rgba(${255 * reading}, ${255 * (1-reading)}, 0, 0.5)`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0,0);
                ctx.lineTo(Math.cos(this.rays[i]) * len, Math.sin(this.rays[i]) * len);
                ctx.stroke();
            }
        }
        ctx.restore();
    }
}

/**
 * 3. THE SIMULATION MANAGER
 */
class Simulation {
    constructor() {
        this.canvas = document.createElement('canvas');
        this.ctx = this.canvas.getContext('2d');
        document.body.appendChild(this.canvas);
        
        this.brainCanvas = document.getElementById('brain-canvas');
        this.brainCtx = this.brainCanvas.getContext('2d');

        this.width = window.innerWidth;
        this.height = window.innerHeight;
        this.canvas.width = this.width;
        this.canvas.height = this.height;

        // State
        this.target = { x: this.width - 100, y: this.height / 2 };
        this.obstacles = []; // Array of lines {a:{x,y}, b:{x,y}}
        this.population = [];
        this.popSize = 100;
        this.generation = 1;
        this.frames = 0;
        this.maxFrames = 800; // Auto-kill generation if taking too long

        // Input Handling
        this.drawing = false;
        this.lastMouse = {x:0, y:0};
        
        this.init();
        this.addEventListeners();
        this.loop();
    }

    init() {
        for(let i=0; i<this.popSize; i++) {
            this.population.push(new Agent());
        }
        // Default Obstacle Maze
        let cx = this.width/2;
        let cy = this.height/2;
        this.obstacles.push({a:{x:cx-50,y:0}, b:{x:cx-50, y:cy-50}});
        this.obstacles.push({a:{x:cx+50,y:this.height}, b:{x:cx+50, y:cy+50}});
    }

    addEventListeners() {
        window.addEventListener('resize', () => {
            this.width = window.innerWidth;
            this.height = window.innerHeight;
            this.canvas.width = this.width;
            this.canvas.height = this.height;
        });

        // Drawing Obstacles (Right Click)
        window.addEventListener('mousedown', e => {
            if (e.button === 2) {
                this.drawing = true;
                this.lastMouse = {x: e.clientX, y: e.clientY};
            } else if (e.button === 0) {
                // Move Target
                this.target.x = e.clientX;
                this.target.y = e.clientY;
            }
        });

        window.addEventListener('mousemove', e => {
            if (this.drawing) {
                this.obstacles.push({
                    a: {x: this.lastMouse.x, y: this.lastMouse.y},
                    b: {x: e.clientX, y: e.clientY}
                });
                this.lastMouse = {x: e.clientX, y: e.clientY};
            }
        });

        window.addEventListener('mouseup', () => this.drawing = false);
        window.addEventListener('contextmenu', e => e.preventDefault());
        
        // Spacebar to skip
        window.addEventListener('keydown', e => {
            if (e.code === 'Space') this.nextGeneration();
        });
    }
    
    clearObstacles() {
        this.obstacles = [];
    }

    nextGeneration() {
        // Genetic Algorithm
        // 1. Calculate fitness
        let maxFit = 0;
        let bestAgent = null;
        for (let agent of this.population) {
            agent.calcFitness(this.target);
            if (agent.fitness > maxFit) {
                maxFit = agent.fitness;
                bestAgent = agent;
            }
        }
        
        // UI Update
        document.getElementById('best-fit').innerText = maxFit.toFixed(4);

        // 2. Selection Pool (Roulette Wheel approach or just simple probability)
        // Normalize fitness
        for (let agent of this.population) {
            agent.fitness /= maxFit;
        }

        const newPop = [];
        
        // ELITISM: Keep the absolute best one unchanged
        if (bestAgent) {
            let elite = new Agent(bestAgent.brain);
            elite.isBest = true; // Mark visual
            newPop.push(elite);
        }

        // Fill the rest
        const mutationRate = document.getElementById('mutation').value / 100;
        
        // Helper: Pick one based on fitness probability
        const pickOne = () => {
            let index = 0;
            let r = Math.random();
            while (r > 0) {
                r -= this.population[index].fitness;
                index++;
                if (index >= this.population.length) index = this.population.length - 1;
            }
            return this.population[index];
        }

        while (newPop.length < this.popSize) {
            let parent = pickOne();
            let child = new Agent(parent.brain);
            child.brain.mutate(mutationRate);
            newPop.push(child);
        }

        this.population = newPop;
        this.generation++;
        this.frames = 0;
        document.getElementById('gen-count').innerText = this.generation;
    }

    drawBrain(agent) {
        // Visualizes the Input -> Hidden -> Output connections
        const ctx = this.brainCtx;
        const w = ctx.canvas.width;
        const h = ctx.canvas.height;
        ctx.clearRect(0,0,w,h);
        
        if (!agent || !agent.lastHiddenState) return;

        const inputs = agent.sensorReadings;
        const hidden = agent.lastHiddenState;
        // Re-calculate outputs just to get raw values for viz if needed, 
        // but we can assume output nodes state based on weights if we really wanted to be precise. 
        // For simplicity, we just draw nodes.

        const drawLayer = (count, layerIndex, totalLayers, values) => {
            const x = (w / (totalLayers + 1)) * (layerIndex + 1);
            const gap = h / (count + 1);
            const positions = [];
            for(let i=0; i<count; i++) {
                let y = gap * (i + 1);
                
                // Color based on activation value (-1 to 1 usually)
                let val = values ? values[i] : 0;
                let c = Math.floor((val + 1) * 127);
                ctx.fillStyle = `rgb(${c}, ${c}, ${c})`;
                ctx.beginPath();
                ctx.arc(x, y, 6, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = '#0f0';
                ctx.stroke();
                positions.push({x,y, val});
            }
            return positions;
        }

        // Draw Nodes
        const iPos = drawLayer(5, 0, 3, inputs);
        const hPos = drawLayer(8, 1, 3, hidden);
        const oPos = drawLayer(2, 2, 3, null); // We don't store raw output state in array, lazy viz

        // Draw Connections (Weights) - Simplified: Just drawing lines if weight is strong
        // Input -> Hidden
        ctx.globalAlpha = 0.2;
        const drawConn = (l1, l2, weights) => {
            for(let i=0; i<l1.length; i++) {
                for(let j=0; j<l2.length; j++) {
                    let weight = weights[j * l1.length + i]; // approximate mapping
                    if (Math.abs(weight) > 0.5) {
                        ctx.strokeStyle = weight > 0 ? '#0f0' : '#f00';
                        ctx.lineWidth = Math.abs(weight);
                        ctx.beginPath();
                        ctx.moveTo(l1[i].x, l1[i].y);
                        ctx.lineTo(l2[j].x, l2[j].y);
                        ctx.stroke();
                    }
                }
            }
        }
        
        drawConn(iPos, hPos, agent.brain.weightsIH);
        drawConn(hPos, oPos, agent.brain.weightsHO);
        ctx.globalAlpha = 1.0;
    }

    loop() {
        const speed = parseInt(document.getElementById('speed').value);

        // Run Logic Steps (Time Warp)
        for (let s = 0; s < speed; s++) {
            this.frames++;
            let allDead = true;
            let currentBest = null;
            let maxDistScore = -Infinity;

            for (let agent of this.population) {
                agent.update(this.obstacles, this.target, this.width, this.height);
                if (!agent.dead) allDead = false;
                
                // Track current leader for this frame
                let d = Math.hypot(agent.pos.x - this.target.x, agent.pos.y - this.target.y);
                let score = -d; // simple heuristic for "who is winning now"
                if (agent.reachedTarget) score += 10000;
                
                if (score > maxDistScore && !agent.dead) {
                    maxDistScore = score;
                    currentBest = agent;
                }
            }
            
            // Mark best for rendering
            this.population.forEach(a => a.isBest = false);
            if (currentBest) currentBest.isBest = true;

            // Auto-Evolve condition
            if (allDead || this.frames > this.maxFrames) {
                this.nextGeneration();
            }
        }

        // Draw Frame
        this.ctx.fillStyle = '#111';
        this.ctx.fillRect(0, 0, this.width, this.height);

        // Draw Target
        this.ctx.fillStyle = `rgba(0, 255, 0, ${0.2 + Math.sin(Date.now()*0.01)*0.1})`;
        this.ctx.beginPath();
        this.ctx.arc(this.target.x, this.target.y, 20, 0, Math.PI*2);
        this.ctx.fill();
        this.ctx.beginPath();
        this.ctx.arc(this.target.x, this.target.y, 5, 0, Math.PI*2);
        this.ctx.fillStyle = '#fff';
        this.ctx.fill();

        // Draw Obstacles
        this.ctx.strokeStyle = '#fff';
        this.ctx.lineWidth = 2;
        this.ctx.beginPath();
        for (let obs of this.obstacles) {
            this.ctx.moveTo(obs.a.x, obs.a.y);
            this.ctx.lineTo(obs.b.x, obs.b.y);
        }
        this.ctx.stroke();

        // Draw Agents
        let aliveCount = 0;
        let bestAgent = null;
        for (let agent of this.population) {
            agent.draw(this.ctx);
            if (!agent.dead) aliveCount++;
            if (agent.isBest) bestAgent = agent;
        }

        // Draw Viz
        if (bestAgent) this.drawBrain(bestAgent);

        // UI Updates
        document.getElementById('alive-count').innerText = aliveCount + " / " + this.popSize;
        document.getElementById('timer').innerText = (this.maxFrames - this.frames);
        document.getElementById('mut-val').innerText = document.getElementById('mutation').value + "%";
        document.getElementById('speed-val').innerText = speed + "x";

        requestAnimationFrame(() => this.loop());
    }
}

const sim = new Simulation();

</script>
</body>
</html>
